{% csrf_token %} {% for field in form %}
<div class="control">
  <label class="mylabel" for="{{ field.auto_id }}">{{ field.label }}</label>
  {{ field }} {% if field.errors %}
  <small
    id="email-helper"
    style="margin-top: 10px; color: var(--pico-del-color)"
  >
    {{ field.errors.0 }}
  </small>
  {% endif %}
</div>
{% endfor %}

{% load i18n %}
<details data-filter-title="{{ title }}" open>
  <summary>
    {% blocktranslate with filter_title=title %} By {{ filter_title }} {% endblocktranslate %}
  </summary>
  <ul class="list-unstyled ps-4" >
  {% for choice in choices %}
    <li>
      <a href="{{ choice.query_string|iriencode }}" class="text-decoration-none {% if choice.selected %} text-dark{% else %}text-muted{% endif %}">{{ choice.display }}</a></li>
  </li>
  {% endfor %}
  </ul>
</details>

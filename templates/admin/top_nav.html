{% block usertools %}
{% if has_permission %}
<nav x-data="topNav" x-cloak class="navbar navbar-expand-lg bg-body-tertiary border-bottom" style="box-shadow: none;">
    <div class="container-fluid">
      <div class="collapse navbar-collapse" id="navbarSupportedContent">
        
        <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
          <li class="nav-item">
            <a class="nav-link" aria-current="page" target="_blank" href="{{ site_url }}">View site</a>
          </li>
          {% if user.has_usable_password %}
          <li class="nav-item">
            <a class="nav-link" target="_blank" href="{% url 'admin:password_change' %}">Change password</a>
          </li>
          {% endif %}
        </ul>
        <form hx-boost="false" id="logout-form" method="post" action="/accounts/logout/">
            {% csrf_token %}
             <input type="hidden" name="next" :value="window.location.href">
            <button class="btn btn-secondary" type="submit">Log out</button>
        </form>
      </div>
    </div>
    <script>
      function topNav() {
        return {
        }
      }
    </script>
  </nav>
{% endif %}
{% endblock %}
{% block nav-global %}{% endblock %}

<!-- templates/custom_user_change_form.html -->

{% extends 'admin/change_form.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div id="content-main" x-data="groupChange">
    <form id="{{ opts.model_name }}_form" method="post" enctype="multipart/form-data" novalidate>
        {% csrf_token %}
        <fieldset class="module aligned">
            <div class="card">
                <div class="card-header">Model Permissions</div>
                <div class="card-body">
                    <div id="div_id_name" class="mb-3">
                        <label for="id_name" class="form-label requiredField">
                            Name<span class="asteriskField">*</span>
                        </label>
                        <input type="text" name="name" class="vTextField admintextinputwidget form-control" maxlength="150" required="" id="id_name">
                    </div>
                    <template x-if="Object.keys(groupedPermissionData).length != 0">
                        <template x-for="[key, value] in Object.entries(groupedPermissionData)">
                              <div class="card mb-3">
                                  <div class="card-body">
                                    <div class="row">
                                        <div class="col-2">
                                            <p class="text-capitalize text-muted" x-text="key"></p>
                                        </div>
                                        <div class="col-10">
                                            <div class="row">
                                                <template x-for="item in value">
                                                    <div class="col-4">
                                                        <p x-text="item.name"></p>
                                                    </div>
                                                </template>
                                            </div>
                                        </div>
                                    </div>
                                  </div>
                              </div>
                        </template>
                    </template>   
                </div>
            </div>
        </fieldset>
    </form>
</div>


<script>
     function groupChange() {
        return {
            groupedPermissionData: {},
            init() {
                const permissionObject = JSON.parse("{{ permission_dict|escapejs }}")
                this.groupedPermissionData = permissionObject.reduce((acc, item) => {
                    const key = item.content_type.name;
                    const value = { id: item.id, name: item.name, codename: item.codename };
                    if (!acc[key]) {
                        acc[key] = [];
                    }
                    acc[key].push(value);
                    return acc;
                }, {});
                console.log(this.groupedPermissionData)
            }
        }
     }

</script>
{% endblock %}

{% load i18n %} {% if app_list %}

<ul class="list-unstyled ps-0" x-data="appList">
  <template x-for="[key, value] in Object.entries(appNames)" :key="key">
    <li class="nav-item mb-1">
      <button x-text="key==='Authentication and Authorization' ? 'Authentication' : key" class="btn btn-toggle d-inline-flex align-items-center rounded border-0 collapsed" data-bs-toggle="collapse" :data-bs-target="`#${key.split(' ')[0]}`" aria-expanded="true"></button>
      <div class="collapse show" :id="key.split(' ')[0]">
        <ul class="btn-toggle-nav list-unstyled fw-normal pb-1 small">
          <template x-for="item in value" :key="item.name">
            <li>
              <a :class="item.url === item.currentUrl ? 'text-dark' : 'text-muted'" class="link-dark d-inline-flex text-decoration-none rounded" :href="item.url" x-text="item.name"></a>
              <span x-html="icons[item.name] != undefined ? icons[item.name]: ''"></span>
            </li>
          </template>
        </ul>
      </div>
    </li>
  </template>
</ul>

<script>
    function appList() {
      return {
         appNames: {},
         icons: {
             "Email addresses" : `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-envelope" viewBox="0 0 16 16">
                                    <path d="M0 4a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2zm2-1a1 1 0 0 0-1 1v.217l7 4.2 7-4.2V4a1 1 0 0 0-1-1zm13 2.383-4.708 2.825L15 11.105zm-.034 6.876-5.64-3.471L8 9.583l-1.326-.795-5.64 3.47A1 1 0 0 0 2 13h12a1 1 0 0 0 .966-.741M1 11.105l4.708-2.897L1 5.383z"/>
                                  </svg>`,
              "Users":  `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-person" viewBox="0 0 16 16">
                      <path d="M8 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6m2-3a2 2 0 1 1-4 0 2 2 0 0 1 4 0m4 8c0 1-1 1-1 1H3s-1 0-1-1 1-4 6-4 6 3 6 4m-1-.004c-.001-.246-.154-.986-.832-1.664C11.516 10.68 10.289 10 8 10s-3.516.68-4.168 1.332c-.678.678-.83 1.418-.832 1.664z"/>
                    </svg>` 
         },
         init() {
           // Construct app names and initialize with empty arrays
           {% for app in app_list %}
           this.appNames['{{ app.name }}'] = [];
           {% endfor %}

           // Populate app names with model names
           {% for app in app_list %}
           {% for model in app.models %}
           this.appNames['{{ app.name }}'].push({ name: '{{ model.name }}', url: '{{ model.admin_url }}', currentUrl: "{{ request.path }}" });
           {% endfor %}
           {% endfor %}

           console.log(this.appNames)
         }
      }
    }
</script>
{% endif %}

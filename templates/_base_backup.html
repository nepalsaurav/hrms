{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta
      name="viewport"
      content="width=device-width,minimum-scale=1,initial-scale=1"
    />
    <title>{% block title %}DjangoX{% endblock title %}</title>

    <meta
      name="description"
      content="A framework for launching new Django projects quickly."
    />
    <meta name="author" content="" />
    <link
      rel="shortcut icon"
      type="image/x-icon"
      href="{% static 'images/favicon.ico' %}"
    />

    <!-- awesomecomplete JavaScript -->
    <script src="{% static 'build/awesomecomplete/awesomecomplete.js' %}"></script>

    {% block css %}
    <!-- Bootstrap CSS -->

    <link
      rel="stylesheet"
      href="{% static 'build/bootstrap/bootstrap.css' %}"
    />

    <!-- pikaday CSS -->
    <link rel="stylesheet" href="{% static 'css/pikaday/pikaday.min.css' %}" />

    <!-- awesomecomplete css -->
    <link
      rel="stylesheet"
      href="{% static 'build/awesomecomplete/awesomecomplete.css' %}"
    />

    <link rel="stylesheet" href="{% static 'css/base.css' %}" />
    {% endblock %}
  </head>

  <body>
    {% include "components/nav/top_nav.html" %}
    <div class="container">
      {% block content %}
      <p>Default content...</p>
      {% endblock content %}
    </div>

    {% block javascript %}

    <!-- Custom Element -->
    {% comment %}
    <script src="{% static 'vite/assets/webcomponents/index.js' %}"></script>
    {% endcomment %}

    <!-- Alpine js -->

    <script src="{% static 'build/alpine/alpine.js' %}"></script>
    <!-- Bootstrap JavaScript -->
    <script src="{% static 'js/bootstrap/bootstrap.min.js' %}"></script>

    <!-- pikaday JavaScript -->

    <script src="{% static 'js/pikaday/pikaday.min.js' %}"></script>
    <script src="{% static 'js/pikaday/pikaday.js' %}"></script>

    <!-- Project JS -->
    <script src="{% static 'js/base.js' %}"></script>

    {% endblock javascript %}
  </body>
</html>
